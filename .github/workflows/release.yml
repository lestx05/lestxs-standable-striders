name: release

on:
  push:
    tags:
      - "v*"
    branches:
      - main
    paths:
      - ".github/workflows/release.yml"
      - "gradle.properties"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.2.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Resolve and validate release version
        id: release
        shell: bash
        env:
          REQUESTED_TAG: ${{ inputs.tag }}
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            tag="$GITHUB_REF_NAME"
          elif [[ -n "$REQUESTED_TAG" ]]; then
            tag="$REQUESTED_TAG"
          else
            tag="v$(sed -n 's/^mod_version=//p' gradle.properties)"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $tag" >&2
            exit 1
          fi

          version="${tag#v}"
          project_version="$(sed -n 's/^mod_version=//p' gradle.properties)"
          if [[ "$version" != "$project_version" ]]; then
            echo "Tag $tag does not match mod_version=$project_version" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "jar=build/libs/standable-striders-$version.jar" >> "$GITHUB_OUTPUT"

      - name: Build release JAR
        run: ./gradlew build

      - name: Smoke-test dedicated server bootstrap
        run: python3 scripts/smoke_test_server.py

      - name: Verify release asset
        shell: bash
        env:
          RELEASE_JAR: ${{ steps.release.outputs.jar }}
        run: |
          test -f "$RELEASE_JAR"
          unzip -t "$RELEASE_JAR"
          sha256sum "$RELEASE_JAR" | sed 's#  .*/#  #' > SHA256SUMS.txt

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          RELEASE_JAR: ${{ steps.release.outputs.jar }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$RELEASE_JAR" SHA256SUMS.txt \
              --clobber \
              --repo "$GITHUB_REPOSITORY"
            exit 0
          fi

          release_flags=()
          if [[ "$RELEASE_VERSION" == 0.* || "$RELEASE_VERSION" == *-* ]]; then
            release_flags+=(--prerelease)
          fi

          gh release create "$RELEASE_TAG" "$RELEASE_JAR" SHA256SUMS.txt \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Standable Striders $RELEASE_TAG" \
            --generate-notes \
            "${release_flags[@]}"
