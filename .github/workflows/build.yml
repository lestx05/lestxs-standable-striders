name: build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: microsoft

      - name: Build
        run: ./gradlew build

      - name: Validate changelog release notes
        shell: bash
        run: |
          version="$(sed -n 's/^mod_version=//p' gradle.properties)"
          python3 scripts/extract_release_notes.py CHANGELOG.md "$version" >/dev/null

      - name: Smoke-test dedicated server bootstrap
        run: python3 scripts/smoke_test_server.py

      - name: Upload mod artifacts
        uses: actions/upload-artifact@v7
        with:
          name: standable-striders
          path: build/libs/*.jar
